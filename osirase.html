<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>年末年始のお知らせ | 末広カントリークラブ</title>
  <meta name="description" content="年末年始の営業時間・特別料金のお知らせです。画像にてご確認いただけます。">
  <link rel="icon" href="rogo3.ico">
  <link rel="stylesheet" href="osirase.css">
</head>
<body>

<main class="ny">

  <header class="ny__head">
    <h1>年末年始のお知らせ</h1>
    <p class="ny__lead">営業時間・料金のご案内です｡</p>
  </header>

  <section class="ny__gallery">
    
    <figure class="ny-card">
      <img src="osirase/in-003-01.jpg" alt="年末・年始営業時間案内" loading="lazy" decoding="async">
      <figcaption>年末・年始 営業時間</figcaption>
    </figure>

    <figure class="ny-card">
      <img src="osirase/in-002-01.jpg" alt="大晦日の営業案内" loading="lazy" decoding="async">
      <figcaption>12/31（大晦日）ご案内</figcaption>
    </figure>

    <figure class="ny-card">
      <img src="osirase/in-001-01.jpg" alt="元日の営業案内" loading="lazy" decoding="async">
      <figcaption>1/1（元日）ご案内</figcaption>
    </figure>
    
  </section>

    <!-- 戻る -->
    <div class="back">
      <a href="index.html" class="btn back-btn">メインページへ</a>
    </div>

</main>

  <!-- フッター -->
  <footer class="site-footer" role="contentinfo">
    <div class="container footer-inner">
      <small>© <span id="year"></span> 末広カントリークラブ</small>
    </div>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
